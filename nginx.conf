# nginx.conf

# Définition du groupe de serveurs backend AdonisJS
upstream adonis_backend {
    # Stratégie round-robin (par défaut)
    server localhost:3333;
    server localhost:3334;
    server localhost:3335;
    
    # Optionnel : sticky sessions pour WebSockets (décommentez si besoin)
    # ip_hash;
}

server {
    listen 80;
    server_name paradis-alimentaires.vercel.app localhost;

    # Logs
    access_log /var/log/nginx/adonis_access.log;
    error_log /var/log/nginx/adonis_error.log;

    # Health check endpoint pour Nginx Plus (optionnel)
    location /health {
        proxy_pass http://adonis_backend;
        # Si vous avez Nginx Plus, décommentez la ligne suivante
        # health_check interval=5s fails=3 passes=2 uri=/health/ready;
    }

    # Redirection de tout le trafic vers le backend AdonisJS
    location / {
        proxy_pass http://adonis_backend;
        proxy_http_version 1.1;
        
        # Headers pour WebSockets
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Headers pour transmettre les informations du client
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}